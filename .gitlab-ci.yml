default:
    image: node:latest
    interruptible: true
    tags:
        - shared-small

stages:
    - install
    - lint
    - security
    - build
    - test

workflow:
    rules:
        - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
        - if: $CI_COMMIT_TAG
        - when: never

include:
    - component: 'gitlab.protontech.ch/proton/devops/cicd-components/kits/devsecops/semgrep@0.0.43'
      inputs:
          runner-tag: shared-small
          stage: security
      rules:
          - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
          - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
          - if: $CI_COMMIT_TAG
          - if: $CI_PIPELINE_SOURCE == "schedule"
            when: never

.pnpm_setup: &pnpm_setup
    before_script:
        - npm install -g pnpm

install:
    <<: *pnpm_setup
    stage: install
    script:
        - pnpm install --frozen-lockfile
    artifacts:
        expire_in: 1 hours
        paths:
            - node_modules
            - pnpm-lock.yaml

lint:
    <<: *pnpm_setup
    stage: lint
    script:
        - pnpm run lint
    dependencies:
        - install

build:
    <<: *pnpm_setup
    stage: build
    script:
        - pnpm install --frozen-lockfile
        - pnpm run build
    artifacts:
        paths:
            - dist
    dependencies:
        - install

test:
    <<: *pnpm_setup
    stage: test
    script:
        - pnpm test
    dependencies:
        - install
        - build
